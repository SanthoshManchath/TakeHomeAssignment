services:

  wiremock:
    image: wiremock/wiremock:3.13.1
    container_name: wifi-wiremock
    command:
      - --port=8080
      - --global-response-templating
      - --verbose
    ports:
      - "8080:8080"
    volumes:
      - ./wiremock/mappings:/home/wiremock/mappings:ro
      - ./wiremock/__files:/home/wiremock/__files:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/__admin/health"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: wifi-provisioning-api:local
    container_name: wifi-api
    depends_on:
      wiremock:
        condition: service_healthy
    ports:
      - "5080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      SpeedProfileApi__BaseUrl: http://wiremock:8080
      ActivationApi__BaseUrl: http://wiremock:8080